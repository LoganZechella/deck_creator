const ItineraryApp = () => {
    const [activeTab, setActiveTab] = useState('timeline');
    const [countdown, setCountdown] = useState('');
    const [isGenerating, setIsGenerating] = useState(false);
    const [statusText, setStatusText] = useState('');
    const contentRef = useRef(null);

    const tabFilenames = {
        timeline: 'Italy-2026-Daily-Itinerary',
        logistics: 'Italy-2026-Logistics',
        lodgings: 'Italy-2026-Lodging',
        finances: 'Italy-2026-Finances',
        tips: 'Italy-2026-Pro-Tips',
    };

    const generatePDF = useCallback(async () => {
        const el = contentRef.current;
        if (!el) return;
        setIsGenerating(true);
        setStatusText('Capturing...');
        try {
            const canvas = await html2canvas(el, {
                scale: 2,
                useCORS: true,
                logging: false,
                backgroundColor: '#f9fafb',
                windowWidth: el.scrollWidth,
            });
            setStatusText('Building PDF...');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
            const pageW = 215.9, pageH = 279.4, margin = 10;
            const usableW = pageW - 2 * margin;
            const usableH = pageH - 2 * margin;
            const scale = usableW / canvas.width;
            const sliceHPx = usableH / scale;
            let y = 0, page = 0;
            while (y < canvas.height) {
                if (page > 0) pdf.addPage();
                const h = Math.min(sliceHPx, canvas.height - y);
                const slice = document.createElement('canvas');
                slice.width = canvas.width;
                slice.height = h;
                slice.getContext('2d').drawImage(canvas, 0, y, canvas.width, h, 0, 0, canvas.width, h);
                pdf.addImage(slice.toDataURL('image/jpeg', 0.95), 'JPEG', margin, margin, usableW, h * scale);
                y += h;
                page++;
            }
            pdf.save(`${tabFilenames[activeTab] || 'Italy-2026'}.pdf`);
        } catch (err) {
            console.error('PDF generation failed:', err);
            setStatusText('Error!');
            await new Promise(r => setTimeout(r, 1500));
        } finally {
            setIsGenerating(false);
            setStatusText('');
        }
    }, [activeTab]);

    useEffect(() => {
        const tripStart = new Date(2026, 4, 1); // May 1, 2026
        const tripEnd = new Date(2026, 4, 16);  // May 16 (day after last day)
        const update = () => {
            const now = new Date();
            if (now < tripStart) {
                const diff = tripStart - now;
                const days = Math.floor(diff / 86400000);
                const hours = Math.floor((diff % 86400000) / 3600000);
                setCountdown(`${days} day${days !== 1 ? 's' : ''}, ${hours} hour${hours !== 1 ? 's' : ''} to go!`);
            } else if (now < tripEnd) {
                const dayNum = Math.floor((now - tripStart) / 86400000) + 1;
                setCountdown(`Day ${dayNum} of 15 — Enjoy Italy!`);
            } else {
                setCountdown('Trip complete!');
            }
        };
        update();
        const id = setInterval(update, 60000);
        return () => clearInterval(id);
    }, []);

    const tabs = [
        { id: 'timeline', label: 'Daily Itinerary', icon: Calendar },
        { id: 'logistics', label: 'Logistics', icon: Plane },
        { id: 'lodgings', label: 'Lodging', icon: Home },
        { id: 'finances', label: 'Finances', icon: DollarSign },
        { id: 'map', label: 'Map View', icon: MapIcon },
        // { id: 'tips', label: 'Pro Tips', icon: Info },
    ];

    return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
            {/* Header */}
            <header className="bg-emerald-900 text-white py-10 px-6 shadow-md">
                <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between">
                    <div>
                        <h1 className="text-3xl md:text-4xl font-bold mb-2">The Zechella Family Italian Odyssey</h1>
                        <p className="text-emerald-200 text-lg flex items-center">
                            <Calendar className="w-5 h-5 mr-2" /> May 1 - May 15, 2026
                        </p>
                        {countdown && <p className="text-emerald-300 text-sm mt-1 ml-7">{countdown}</p>}
                    </div>
                    <div className="mt-6 md:mt-0 flex gap-4 items-center">
                        <div className="bg-emerald-800/50 p-3 rounded-lg text-center backdrop-blur-sm border border-emerald-700/50">
                            <span className="block text-2xl font-bold">5</span>
                            <span className="text-xs uppercase tracking-wider text-emerald-300">Travelers</span>
                        </div>
                        <div className="bg-emerald-800/50 p-3 rounded-lg text-center backdrop-blur-sm border border-emerald-700/50">
                            <span className="block text-2xl font-bold">15</span>
                            <span className="text-xs uppercase tracking-wider text-emerald-300">Days</span>
                        </div>
                        <div className="bg-emerald-800/50 p-3 rounded-lg text-center backdrop-blur-sm border border-emerald-700/50">
                            <span className="block text-2xl font-bold">3</span>
                            <span className="text-xs uppercase tracking-wider text-emerald-300">Cities</span>
                        </div>
                        {activeTab !== 'map' && (
                            <button
                                onClick={generatePDF}
                                disabled={isGenerating}
                                className={`ml-2 text-white p-3 rounded-lg flex items-center gap-2 transition-colors shadow-sm border ${
                                    isGenerating
                                        ? 'bg-emerald-700 border-emerald-600 cursor-wait'
                                        : 'bg-emerald-600 hover:bg-emerald-500 border-emerald-500'
                                }`}
                            >
                                {isGenerating ? (
                                    <>
                                        <svg className="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                        </svg>
                                        <span className="font-bold hidden sm:inline">{statusText}</span>
                                    </>
                                ) : (
                                    <>
                                        <Download className="w-5 h-5" />
                                        <span className="font-bold hidden sm:inline">Save PDF</span>
                                    </>
                                )}
                            </button>
                        )}
                    </div>
                </div>
            </header>

            {/* Navigation */}
            <div className="bg-white border-b sticky top-0 z-20 shadow-sm">
                <div className="max-w-5xl mx-auto flex overflow-x-auto hide-scrollbar">
                    {tabs.map((tab) => {
                        const Icon = tab.icon;
                        const isActive = activeTab === tab.id;
                        return (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center px-6 py-4 whitespace-nowrap border-b-2 transition-colors duration-200 font-medium ${
                                    isActive
                                        ? 'border-emerald-600 text-emerald-700'
                                        : 'border-transparent text-gray-500 hover:text-gray-800 hover:bg-gray-50'
                                }`}
                            >
                                <Icon className={`w-5 h-5 mr-2 ${isActive ? 'text-emerald-600' : 'text-gray-400'}`} />
                                {tab.label}
                            </button>
                        );
                    })}
                </div>
            </div>

            {/* Main Content Area */}
            <main ref={contentRef} className="max-w-5xl mx-auto p-4 md:p-6 lg:p-8">
                {activeTab === 'timeline' && <TimelineView />}
                {activeTab === 'logistics' && <LogisticsView />}
                {activeTab === 'lodgings' && <LodgingsView />}
                {activeTab === 'finances' && <FinancesView />}
                {activeTab === 'map' && <MapView />}
                {/* {activeTab === 'tips' && <TipsView />} */}
            </main>
        </div>
    );
};
